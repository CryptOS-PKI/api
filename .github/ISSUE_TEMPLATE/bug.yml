name: Bug report
description: Report a defect in the API definitions or generated stubs
title: "fix: "
labels: ["bug"]
assignees: ["Bugs5382"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: The actual behavior, with any error output.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps — the RPC/message and the call that triggers it.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: api module version/commit, which consumer (cryptos / manager / web), Go or TypeScript stubs, and protoc/buf version if regenerating.
    validations:
      required: false
