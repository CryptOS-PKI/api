version: '3'

# Task targets for the CryptOS-PKI api/ module.
# Requires on PATH: buf, protoc-gen-go, protoc-gen-go-grpc, protoc-gen-connect-go, golic, npx.
# The TypeScript plugin (@bufbuild/protoc-gen-es) runs via `npx -y`, pinned by version
# in buf.gen.yaml; no local npm install needed, but `buf generate` requires network
# access to fetch it on first run (npx caches after that). Connect-ES v2's unified
# protoc-gen-es also emits the Connect service definitions -- there is no separate
# connect-es codegen plugin in the v2 line.

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  fmt:
    desc: Format proto files
    cmds:
      - buf format -w

  lint:
    desc: Lint proto files
    cmds:
      - buf lint
      - buf format -d

  generate:
    desc: Generate Go stubs from protos
    cmds:
      - buf generate

  generate:verify:
    desc: Generate and assert the working tree is clean
    cmds:
      - task: generate
      - |
        if ! git diff --quiet go/; then
          echo "Generated stubs are out of date. Run 'task generate' and commit the result." >&2
          git --no-pager diff go/ >&2
          exit 1
        fi

  license:
    desc: Verify every source file carries the Apache 2.0 license header (CI; never writes).
    cmds:
      - go install github.com/Bugs5382/golic/cmd/golic@v0.2.0
      - golic inject -t apache2 -c "2026 Shane" --dry -x
  license:fix:
    desc: Inject the Apache 2.0 header into any source file missing it.
    cmds:
      - go install github.com/Bugs5382/golic/cmd/golic@v0.2.0
      - golic inject -t apache2 -c "2026 Shane"

  test:
    desc: Run Go tests
    cmds:
      - go test ./go/...

  tidy:
    desc: Tidy the Go module
    cmds:
      - go mod tidy

  ci:
    desc: Full local validation chain (fmt + lint + generate-and-verify + test)
    cmds:
      - task: fmt
      - task: lint
      - task: generate:verify
      - task: test
    # Note: a strict license:check gate isn't part of `task ci` because
    # `buf format` reindents block comments in a way `golic --dry`
    # doesn't recognize as equivalent. Headers are visually confirmed and
    # `task license` is the canonical re-injection step.
