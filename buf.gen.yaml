version: v2
inputs:
  - directory: proto
plugins:
  - local: protoc-gen-go
    out: go
    opt:
      - paths=source_relative
  - local: protoc-gen-go-grpc
    out: go
    opt:
      - paths=source_relative
      - require_unimplemented_servers=false
  - local: protoc-gen-connect-go
    out: go
    opt:
      - paths=source_relative
  - local: ["npx", "-y", "@bufbuild/protoc-gen-es@2.12.1"]
    out: gen/ts
    opt:
      - target=ts
