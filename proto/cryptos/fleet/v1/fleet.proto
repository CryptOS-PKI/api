package cryptos.fleet.v1;

option go_package = "github.com/CryptOS-PKI/api/go/cryptos/fleet/v1;fleetv1";

// FleetService is the Fleet Manager's surface over a set of CryptOS nodes:
// read aggregation (status, identity, certificates, catalog) plus the
// operator-driven enrollment writes. A single Connect endpoint for the
// manager's web UI.
service FleetService {
  // ListNodes returns a summary for every node the manager knows about.
  rpc ListNodes(ListNodesRequest) returns (ListNodesResponse);

  // GetNode returns full detail, including the identity chain, for one node.
  rpc GetNode(GetNodeRequest) returns (GetNodeResponse);

  // ListCertificates returns the aggregated certificate set across nodes,
  // optionally scoped to a single node.
  rpc ListCertificates(ListCertificatesRequest) returns (ListCertificatesResponse);

  // ListProfiles returns the manager's catalog of certificate issuance
  // profiles.
  rpc ListProfiles(ListProfilesRequest) returns (ListProfilesResponse);

  // ListAdapters returns the manager's catalog of enrollment protocol
  // adapters.
  rpc ListAdapters(ListAdaptersRequest) returns (ListAdaptersResponse);

  // ListAudit returns the manager's audit log.
  rpc ListAudit(ListAuditRequest) returns (ListAuditResponse);

  // ListEnrollments returns the manager's pending and resolved enrollment
  // requests.
  rpc ListEnrollments(ListEnrollmentsRequest) returns (ListEnrollmentsResponse);

  // CreateEnrollment opens a new enrollment request (LINK a node or provision a
  // SUBORDINATE CA); the manager verifies attestation for LINK.
  rpc CreateEnrollment(CreateEnrollmentRequest) returns (CreateEnrollmentResponse);

  // ApproveEnrollment approves a pending request (LINK -> ApplyConfig managed
  // state; SUBORDINATE -> CSR-ferry).
  rpc ApproveEnrollment(ApproveEnrollmentRequest) returns (ApproveEnrollmentResponse);

  // RejectEnrollment rejects a pending request with a reason.
  rpc RejectEnrollment(RejectEnrollmentRequest) returns (RejectEnrollmentResponse);

  // WhoAmI echoes the operator identity the manager verified from the
  // presented client certificate (subject CN, cert serial, access level).
  rpc WhoAmI(WhoAmIRequest) returns (WhoAmIResponse);

  // RevokeCertificate revokes an issued certificate on the node that issued
  // it, identified by node name and hex serial, with an RFC 5280 reason code.
  rpc RevokeCertificate(RevokeCertificateRequest) returns (RevokeCertificateResponse);

  // IssueLeaf signs a leaf certificate on the named issuing node from a
  // browser-generated PKCS#10 CSR under a named issuance profile. Only the
  // CSR crosses the wire; the leaf private key stays in the browser.
  rpc IssueLeaf(IssueLeafRequest) returns (IssueLeafResponse);

  // RekeyNode re-keys a subordinate CA node in one orchestrated call: the
  // manager has the child mint a new key + CSR, routes the CSR to the parent
  // (resolved from the child's issuer CN) for signing under profile_name, and
  // delivers the signed chain back to the child. The parent must be a node the
  // manager already knows about.
  rpc RekeyNode(RekeyNodeRequest) returns (RekeyNodeResponse);
}

message ListNodesRequest {}

message ListNodesResponse {
  repeated NodeSummary nodes = 1;
}

message GetNodeRequest {
  string name = 1;
}

message GetNodeResponse {
  NodeDetail node = 1;
}

message ListCertificatesRequest {
  // node scopes the result to a single node by name; empty means all nodes.
  string node = 1;
}

message ListCertificatesResponse {
  repeated Certificate certificates = 1;
}

message ListProfilesRequest {}

message ListProfilesResponse {
  repeated CertProfile items = 1;
}

message ListAdaptersRequest {}

message ListAdaptersResponse {
  repeated EnrollmentAdapter items = 1;
}

message ListAuditRequest {}

message ListAuditResponse {
  repeated AuditEvent items = 1;
}

message ListEnrollmentsRequest {}

message ListEnrollmentsResponse {
  repeated EnrollmentRequest items = 1;
}

// Health reports the manager's view of node reachability, independent of
// the node's own reported identity state.
enum Health {
  HEALTH_UNSPECIFIED = 0;
  HEALTH_UP = 1;
  HEALTH_DOWN = 2;
  HEALTH_ERROR = 3;
}

// NodeSummary is the per-node row shown in the fleet list.
message NodeSummary {
  string name = 1;
  string address = 2;
  // root|intermediate|issuing
  string role = 3;
  // ESTABLISHED|AWAITING_CERT|REVOKED|UNKNOWN
  string identity_state = 4;
  string cn = 5;
  string issuer = 6;
  Health health = 7;
  string health_detail = 8;
}

// NodeIdentity carries the node's CA chain, mirroring cryptos.v1.Identity
// but scoped to the FleetService's own message set.
message NodeIdentity {
  string chain_pem = 1;
  repeated bytes chain_der = 2;
  string leaf_sha256 = 3;
}

// NodeDetail is the full per-node view returned by GetNode.
message NodeDetail {
  NodeSummary summary = 1;
  NodeIdentity identity = 2;
  bool tpm_available = 3;
  uint64 boot_count = 4;
  string uptime = 5;
}

// Certificate is a single issued or revoked certificate as aggregated from a
// node's cert surface. Timestamps are RFC3339 strings for display parity
// with the web UI.
message Certificate {
  string serial = 1;
  string subject_cn = 2;
  string issuer_node = 3;
  // leaf|subordinate-ca
  string kind = 4;
  // VALID|EXPIRED|REVOKED
  string status = 5;
  string not_before = 6;
  string not_after = 7;
  string profile = 8;
  string revoked_at = 9;
  string reason = 10;
}

// CertProfile is a reusable issuance template, mirroring the web UI's
// profile catalog entry.
message CertProfile {
  string name = 1;
  // ECDSA-P256|ECDSA-P384|RSA-3072|RSA-4096
  string key_alg = 2;
  repeated string key_usage = 3;
  repeated string ext_key_usage = 4;
  bool is_ca = 5;
  int32 path_len = 6;
  repeated string sans = 7;
  int32 validity_days = 8;
}

// EnrollmentAdapter is an enrollment protocol adapter binding, mirroring the
// web UI's protocol catalog entry.
message EnrollmentAdapter {
  // acme|est|ms-autoenroll|scep
  string kind = 1;
  string name = 2;
  string endpoint = 3;
  string profile = 4;
  bool enabled = 5;
  repeated string challenges = 6;
  string gpo_template = 7;
}

// AuditEvent is a single manager audit log entry.
message AuditEvent {
  string id = 1;
  string at = 2;
  // config-applied|enroll-approved|enroll-rejected|issued|profile-created|
  // profile-updated|protocol-toggled|rekeyed|renewed|revoked
  string kind = 3;
  string summary = 4;
  // cert|enrollment|node|profile|protocol
  string target_kind = 5;
  string target_path = 6;
}

// EnrollmentRequest is a node enrollment request awaiting (or resolved by)
// admin approval. Attestation and CSR detail are flattened to display
// strings for this read-only surface.
message EnrollmentRequest {
  string id = 1;
  string proposed_name = 2;
  // root|intermediate|issuing
  string role = 3;
  string parent_cn = 4;
  string address = 5;
  // PENDING|APPROVED|REJECTED
  string status = 6;
  // attestation detail, e.g. "TPM . sealed" or "UNAVAILABLE . nodeID"
  string attestation_summary = 7;
  string attestation_node_id = 8;
  // CSR detail, e.g. "ECDSA P-384"
  string csr_key_type = 9;
  string csr_subject_cn = 10;
  string requested_at = 11;
  string rejection_reason = 12;
  string admitted_node_name = 13;
  // LINK|SUBORDINATE
  string kind = 14;
  // SPKI SHA-256 (hex) of the node identity pinned at first enroll (TOFU).
  string pinned_key_sha256 = 15;
}

message CreateEnrollmentRequest {
  // LINK|SUBORDINATE
  string kind = 1;
  // LINK: how to reach + initially trust the node.
  string node_endpoint = 2;
  string admin_cert_pem = 3;
  string admin_key_pem = 4;
  string ca_pem = 5;
  // SUBORDINATE: the child node, its parent CA, and the issuing profile.
  string child_node = 6;
  string parent_cn = 7;
  string profile = 8;
}

message CreateEnrollmentResponse {
  EnrollmentRequest enrollment = 1;
}

message ApproveEnrollmentRequest {
  string id = 1;
  // LINK approval re-supplies the node connection material (nothing sensitive
  // is persisted between create and approve). Ignored for SUBORDINATE.
  string node_endpoint = 2;
  string admin_cert_pem = 3;
  string admin_key_pem = 4;
  string ca_pem = 5;
}

message ApproveEnrollmentResponse {
  EnrollmentRequest enrollment = 1;
}

message RejectEnrollmentRequest {
  string id = 1;
  string reason = 2;
}

message RejectEnrollmentResponse {
  EnrollmentRequest enrollment = 1;
}

message WhoAmIRequest {}

// OperatorIdentity is the operator the manager verified from the mTLS client
// certificate presented on the management-plane connection.
message OperatorIdentity {
  string cn = 1;
  string serial = 2;
  // access level: "viewer" | "operator" | "admin"
  string level = 3;
}

message WhoAmIResponse {
  OperatorIdentity operator = 1;
}

// RevokeCertificateRequest identifies the certificate to revoke by its issuing
// node and hex serial, with the RFC 5280 reason code for the revocation.
message RevokeCertificateRequest {
  // node_name is the issuing node the certificate lives on.
  string node_name = 1;
  // serial_hex is the certificate to revoke.
  string serial_hex = 2;
  // reason_code is the RFC 5280 CRLReason code.
  int32 reason_code = 3;
}

// RevokeCertificateResponse echoes the revoked certificate's serial, the time
// it was revoked (RFC3339), and the reason code the node recorded.
message RevokeCertificateResponse {
  string serial_hex = 1;
  string revoked_at = 2;
  int32 reason_code = 3;
}

// IssueLeafRequest carries the issuing node, the browser-generated PKCS#10
// CSR, and the issuance profile to sign the leaf under.
message IssueLeafRequest {
  // node_name is the issuing node that signs the leaf.
  string node_name = 1;
  // csr_der is the DER-encoded PKCS#10 CSR from the browser.
  bytes csr_der = 2;
  // profile_name is the issuance profile the node signs under.
  string profile_name = 3;
}

// IssueLeafResponse carries the signed leaf certificate.
message IssueLeafResponse {
  // cert_der is the signed leaf certificate, DER-encoded.
  bytes cert_der = 1;
}

// RekeyNodeRequest names the subordinate to re-key and the CA profile the
// parent signs the new key under.
message RekeyNodeRequest {
  // node_name is the subordinate CA to re-key.
  string node_name = 1;
  // profile_name is the CA profile the parent signs the new CSR under (e.g.
  // "sub-ca").
  string profile_name = 2;
}

// RekeyNodeResponse reports the re-keyed identity: the node's own subject CN,
// the parent that signed it, and the number of certificates in the new chain.
message RekeyNodeResponse {
  // subject_cn is the re-keyed node's identity CN.
  string subject_cn = 1;
  // issuer_cn is the parent CA that signed the new key.
  string issuer_cn = 2;
  // chain_len is the number of certificates in the new chain.
  int32 chain_len = 3;
}
