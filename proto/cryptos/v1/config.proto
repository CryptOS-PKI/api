package cryptos.v1;

option go_package = "github.com/CryptOS-PKI/api/go/cryptos/v1;cryptosv1";

// MachineConfig is the declarative configuration applied via ApplyConfig.
// Phase 1 defines this subset. Future phases add fields additively;
// breaking changes require a new apiVersion ("cryptos.dev/v1beta1", etc.).
message MachineConfig {
  // Must be "cryptos.dev/v1alpha1" in Phase 1. Validator rejects other values.
  string api_version = 1;
  // Must be "MachineConfig" in Phase 1.
  string kind = 2;
  Metadata metadata = 3;
  Role role = 4;
  Network network = 5;
  Storage storage = 6;
  Bootstrap bootstrap = 7;
  Pki pki = 8;
  // install carries the target-disk declaration for the maintenance-mode
  // install flow. Ignored by an already-installed node.
  Install install = 9;
  // state_key selects how the LUKS state-partition key is protected. Empty
  // uses the node's build-time default (nodeid or tpm).
  StateKey state_key = 10;
  // management carries FM-managed state pushed via ApplyConfig when a node is
  // linked to a Fleet Manager (LINK enrollment). Empty on unmanaged nodes.
  Management management = 11;
}

// Management marks a node as Fleet-Manager-managed. Set by a LINK enrollment
// approval via ApplyConfig; takes effect on reboot.
message Management {
  // Subject CN of the managing Fleet Manager operator identity.
  string manager_cn = 1;
  // PEM trust anchor (operator CA) the node adds to its authorized client CAs.
  string trust_pem = 2;
  // When true, the node's embedded operator surface is read-only.
  bool operator_surface_readonly = 3;
}

// StateKey selects the protector for the encrypted state-partition key.
message StateKey {
  // mode is "nodeid" | "tpm" | "kms"; empty means the build-time default.
  string mode = 1;
  // kms carries the KMS settings when mode is "kms".
  KmsStateKey kms = 2;
}

// KmsStateKey configures the envelope-encryption KMS that seals/unseals the
// state key. The sealed blob and endpoint are stored in the LUKS2 header token,
// so only first-boot provisioning reads this from the machine config.
message KmsStateKey {
  // endpoint is the base URL of the seal/unseal KMS.
  string endpoint = 1;
  // trust_pem optionally pins the PEM CA bundle verifying the KMS TLS server.
  string trust_pem = 2;
}

message Metadata {
  string name = 1;
}

message Role {
  // Phase 1: must be "root". Phase 2 adds "intermediate" and "issuing".
  string kind = 1;
}

message Network {
  string interface = 1;
  // CIDR notation, e.g. "10.0.0.10/24".
  string address = 2;
  string gateway = 3;
}

message Storage {
  string state_partition_label = 1;
  bool first_boot = 2;
}

// Bootstrap carries the administrator credential trusted on first boot.
// Exactly one of admin_cert_pem or admin_cert_sha256 is required.
message Bootstrap {
  string admin_cert_pem = 1;
  string admin_cert_sha256 = 2;
}

message Pki {
  // Phase 1: must be "ECDSA-P384" for Roots.
  string root_key_alg = 1;
  Subject root_subject = 2;
  uint32 root_validity_years = 3;
  uint32 path_len_constraint = 4;
  // Named certificate profiles this node may generate a CSR from or stamp when
  // signing (Phase 2). Referenced by name from the role/issuance flows.
  repeated CertificateProfile profiles = 5;
  // parent pins the CA that signs this subordinate node's certificate, so it
  // can verify the chain it is handed (Phase 2; unset on a Root).
  Parent parent = 6;
  // revocation_base_url is the base URL under which this node serves its CRL
  // and OCSP responder. When set, issued certs carry CDP/AIA pointers and the
  // node serves /crl and /ocsp over HTTP (Phase 2 revocation).
  string revocation_base_url = 7;
  // allow_unverified_revocation_url overrides the fail-closed revocation
  // preflight so an isolated/air-gapped node issues even when the revocation
  // URL does not resolve.
  bool allow_unverified_revocation_url = 8;
  // crl_next_update_hours is the CRL validity window: nextUpdate is thisUpdate
  // plus this many hours. Zero means the node default.
  uint32 crl_next_update_hours = 9;
  // revocation_http_port is the TCP port for the anonymous CRL/OCSP HTTP
  // listener. Zero means the node default.
  uint32 revocation_http_port = 10;
  // root_leaf_issuance is the explicit, irreversible operator acknowledgement
  // that unlocks direct end-entity (leaf) issuance from a ROOT-role node. Empty
  // (the default) leaves a Root refusing to issue leaves. Carried in the proto
  // so the acknowledgement survives ApplyConfig and reaches an installed node.
  string root_leaf_issuance = 11;
}

// Parent is the trust anchor a subordinate CA pins for its issuer: the parent
// (or root) CA certificate, by full PEM or by SHA-256 fingerprint. Exactly one
// is set. Unused by a Root.
message Parent {
  string ca_cert_pem = 1;
  string ca_cert_sha256 = 2;
}

// CertificateProfile drives CSR generation and certificate signing: key
// parameters, subject, validity, and X.509 extensions. Phase 2 defines a
// covering subset of typed extensions plus a raw-extension escape hatch; the
// set grows additively toward the full X.509 catalog.
message CertificateProfile {
  string name = 1;
  // e.g. "ECDSA-P384". Covering subset; RSA sizes and other curves are additive.
  string key_alg = 2;
  Subject subject = 3;
  uint32 validity_days = 4;
  BasicConstraints basic_constraints = 5;
  // e.g. "cert_sign", "crl_sign", "digital_signature", "key_encipherment".
  repeated string key_usage = 6;
  // e.g. "server_auth", "client_auth".
  repeated string ext_key_usage = 7;
  SubjectAltNames sans = 8;
  // Raw-OID escape hatch for extensions not yet modeled as typed fields.
  repeated X509Extension extra_extensions = 9;
}

message BasicConstraints {
  bool is_ca = 1;
  // path_len applies when is_ca. 0 = no CAs may be issued below this one
  // (a leaf-only issuing CA). Absent = unconstrained depth.
  optional uint32 path_len = 2;
}

message SubjectAltNames {
  repeated string dns = 1;
  repeated string ip = 2;
  repeated string email = 3;
  repeated string uri = 4;
}

// X509Extension is the raw escape hatch: a dotted OID, criticality flag, and the
// DER-encoded extension value, for extensions not yet modeled as typed fields.
message X509Extension {
  string oid = 1;
  bool critical = 2;
  bytes value = 3;
}

// Install declares how the node provisions itself to persistent storage during
// the maintenance-mode install (apply-config in maintenance). Ignored by an
// already-installed node.
message Install {
  // disk is the target block device to install to and WIPE, e.g. "/dev/nvme0n1".
  string disk = 1;
}

message Subject {
  string common_name = 1;
  string organization = 2;
  string country = 3;
}
