package cryptos.v1;

option go_package = "github.com/CryptOS-PKI/api/go/cryptos/v1;cryptosv1";

// MachineConfig is the declarative configuration applied via ApplyConfig.
// Phase 1 defines this subset. Future phases add fields additively;
// breaking changes require a new apiVersion ("cryptos.dev/v1beta1", etc.).
message MachineConfig {
  // Must be "cryptos.dev/v1alpha1" in Phase 1. Validator rejects other values.
  string api_version = 1;
  // Must be "MachineConfig" in Phase 1.
  string kind = 2;
  Metadata metadata = 3;
  Role role = 4;
  Network network = 5;
  Storage storage = 6;
  Bootstrap bootstrap = 7;
  Pki pki = 8;
  // install carries the target-disk declaration for the maintenance-mode
  // install flow. Ignored by an already-installed node.
  Install install = 9;
}

message Metadata {
  string name = 1;
}

message Role {
  // Phase 1: must be "root". Phase 2 adds "intermediate" and "issuing".
  string kind = 1;
}

message Network {
  string interface = 1;
  // CIDR notation, e.g. "10.0.0.10/24".
  string address = 2;
  string gateway = 3;
}

message Storage {
  string state_partition_label = 1;
  bool first_boot = 2;
}

// Bootstrap carries the administrator credential trusted on first boot.
// Exactly one of admin_cert_pem or admin_cert_sha256 is required.
message Bootstrap {
  string admin_cert_pem = 1;
  string admin_cert_sha256 = 2;
}

message Pki {
  // Phase 1: must be "ECDSA-P384" for Roots.
  string root_key_alg = 1;
  Subject root_subject = 2;
  uint32 root_validity_years = 3;
  uint32 path_len_constraint = 4;
}

// Install declares how the node provisions itself to persistent storage during
// the maintenance-mode install (apply-config in maintenance). Ignored by an
// already-installed node.
message Install {
  // disk is the target block device to install to and WIPE, e.g. "/dev/nvme0n1".
  string disk = 1;
}

message Subject {
  string common_name = 1;
  string organization = 2;
  string country = 3;
}
