package cryptos.v1;

option go_package = "github.com/CryptOS-PKI/api/go/cryptos/v1;cryptosv1";

// Identity is the response from GetIdentity. Carries the node's CA chain
// in both DER and PEM forms. For a Phase 1 Root the chain has length 1.
message Identity {
  // DER-encoded certificate chain, leaf-first.
  repeated bytes chain_der = 1;

  // PEM-encoded chain, leaf-first. Same certificates as chain_der; provided
  // for client convenience.
  string chain_pem = 2;

  // SHA-256 digest of the leaf certificate's DER bytes.
  bytes leaf_sha256 = 3;
}
