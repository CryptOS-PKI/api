package cryptos.v1;

import "cryptos/v1/ceremony.proto";
import "cryptos/v1/config.proto";
import "cryptos/v1/identity.proto";
import "cryptos/v1/status.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/CryptOS-PKI/api/go/cryptos/v1;cryptosv1";

// NodeService is the Phase 1 management surface for a single CryptOS node.
// All RPCs are served over mTLS gRPC on port 443 of the management
// interface, plus a local UNIX socket for on-box cryptosctl access.
//
// Phase 1 ships exactly these RPCs. Phase 2 splits SignCSR into
// role-restricted RPCs and adds protocol-adapter management.
service NodeService {
  // ApplyConfig sets the node's declarative machine configuration.
  // Returns requires_reboot=true when the change cannot take effect at runtime.
  rpc ApplyConfig(ApplyConfigRequest) returns (ApplyConfigResponse);

  // GetStatus returns node role, identity state, and subsystem health.
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);

  // GetIdentity returns the node's CA certificate chain in DER and PEM.
  rpc GetIdentity(GetIdentityRequest) returns (GetIdentityResponse);

  // StartCeremony drives the first-boot ceremony. Operator-initiated;
  // streams progress events until completion. Only valid when the node
  // is in the no-identity state.
  rpc StartCeremony(StartCeremonyRequest) returns (stream StartCeremonyResponse);

  // SignCSR signs a Certificate Signing Request with the Root CA key.
  // Phase 1 debug-only: included only in builds compiled with
  // -tags=debug_signcsr. Phase 2 replaces this with role-restricted
  // RPCs (Root.SignSubordinateCSR and an internal Issuing.IssueLeaf).
  rpc SignCSR(SignCSRRequest) returns (SignCSRResponse);

  // SignSubordinateCSR signs a child CA's CSR into a CA certificate per a
  // named profile (BasicConstraints CA:TRUE, pathLen clamped to the parent's
  // budget) and returns the new cert plus the parent's chain. Role-restricted
  // (a CA that may sign sub-CAs) and authorized by the bootstrap admin;
  // reachable online (parent mTLS) or offline (operator ferry via the local
  // socket). Supersedes the debug-only SignCSR for the CA path.
  rpc SignSubordinateCSR(SignSubordinateCSRRequest) returns (SignSubordinateCSRResponse);

  // IssueLeaf signs an end-entity (CA:FALSE) certificate per a named profile.
  // Role-restricted (intermediate/issuing; a root only with the irreversible
  // ack). The internal path the Phase-2 protocol adapters will call.
  rpc IssueLeaf(IssueLeafRequest) returns (IssueLeafResponse);

  // GetSubordinateCSR returns the CSR a subordinate node generated on first
  // boot, while it is in IDENTITY_STATE_AWAITING_CERT. The operator carries it
  // to the parent's SignSubordinateCSR (Refused unless awaiting a cert).
  rpc GetSubordinateCSR(GetSubordinateCSRRequest) returns (GetSubordinateCSRResponse);

  // SubmitSubordinateCertificate hands a subordinate node the parent-signed
  // certificate + chain. The node verifies the chain roots to its configured
  // parent trust anchor (pki.parent) and that the leaf matches its own key,
  // then commits and becomes ESTABLISHED. Returns the committed identity.
  rpc SubmitSubordinateCertificate(SubmitSubordinateCertificateRequest) returns (SubmitSubordinateCertificateResponse);

  // RevokeCertificate marks a certificate this node issued (identified by its
  // hex serial) as revoked with an RFC 5280 reason, records it, and refreshes
  // the CRL. Admin-authorized. NotFound if the serial is not in this node's
  // issued set. Idempotent: re-revoking returns the existing revocation.
  rpc RevokeCertificate(RevokeCertificateRequest) returns (RevokeCertificateResponse);

  // ListIssued returns the certificates this node has issued, for inventory
  // and for the Fleet Manager to drive revocation.
  rpc ListIssued(ListIssuedRequest) returns (ListIssuedResponse);

  // ListRevocations returns this node's revoked certificates.
  rpc ListRevocations(ListRevocationsRequest) returns (ListRevocationsResponse);

  // ExportCAKey returns an encrypted backup of this node's software CA key and
  // certificate chain, sealed under the operator passphrase. The plaintext key
  // never leaves the node. Admin-authorized; refused on a TPM node (TPM keys
  // are non-exportable by design).
  rpc ExportCAKey(ExportCAKeyRequest) returns (ExportCAKeyResponse);

  // ImportCAKey restores a CA from an encrypted backup: it is the recovery
  // counterpart of StartCeremony, valid only on a node whose storage is up but
  // which has no identity yet. It decrypts the envelope with the passphrase and
  // commits the restored key + chain, becoming ESTABLISHED as the same CA.
  rpc ImportCAKey(ImportCAKeyRequest) returns (ImportCAKeyResponse);

  // BeginKeyRotation starts a subordinate CA key rotation: the established
  // intermediate/issuing node generates a new key and returns a CSR to ferry to
  // the parent, while continuing to sign with its current key. Admin-authorized;
  // refused on a root or a node with no identity.
  rpc BeginKeyRotation(BeginKeyRotationRequest) returns (BeginKeyRotationResponse);

  // CompleteKeyRotation submits the parent-signed chain for the new key. The
  // node verifies it roots to the pinned parent and matches the staged new key,
  // then atomically swaps to the new key + cert. Certificates the old key signed
  // remain valid until they expire.
  rpc CompleteKeyRotation(CompleteKeyRotationRequest) returns (CompleteKeyRotationResponse);

  // Reset destroys the node's identity: it erases the state-partition key
  // material (rendering all encrypted data unrecoverable), clears any staged
  // config, and reboots into maintenance. Served ONLY on the local UNIX
  // socket (physical-console trust); the node refuses it over mTLS and in
  // maintenance mode. The caller must echo the current Root CA CN as
  // confirmation.
  rpc Reset(ResetRequest) returns (ResetResponse);

  // Attest signs the caller's nonce with the node's CA identity key so the
  // Fleet Manager can verify possession of the node identity (challenge-
  // response). ek_pub/ek_cert are reserved for future TPM EK attestation.
  rpc Attest(AttestRequest) returns (AttestResponse);
}

message ApplyConfigRequest {
  MachineConfig config = 1;
}

message ApplyConfigResponse {
  // Monotonically increasing generation; bumped on every successful apply.
  uint64 generation = 1;
  // True when the apply changed a field that takes effect only on reboot.
  bool requires_reboot = 2;
  // SHA-256 digest of the canonical-encoded applied configuration.
  bytes config_digest = 3;
}

message GetStatusRequest {}

message GetStatusResponse {
  NodeStatus status = 1;
}

message GetIdentityRequest {}

message GetIdentityResponse {
  Identity identity = 1;
}

message StartCeremonyRequest {
  CeremonyKind kind = 1;
  // Operator's machine config to apply as part of the ceremony.
  // Carried as YAML bytes; server parses and validates.
  bytes machine_config_yaml = 2;
}

// StartCeremonyResponse is the unit streamed back during a ceremony.
// Exactly one detail field on the embedded event is set per message.
message StartCeremonyResponse {
  CeremonyEvent event = 1;
}

// SignCSRRequest carries a DER-encoded PKCS#10 CSR and the profile to apply.
// Phase 1 debug build only.
message SignCSRRequest {
  bytes csr_der = 1;
  string profile = 2;
}

message SignCSRResponse {
  bytes cert_der = 1;
}

// ResetRequest confirms a destructive node reset. confirm_common_name must
// exactly equal the node's current Root CA CN, or the node refuses the reset.
message ResetRequest {
  string confirm_common_name = 1;
}

message ResetResponse {}

message AttestRequest {
  // Random challenge from the manager; the node signs it with its identity key.
  bytes nonce = 1;
}

message AttestResponse {
  // ECDSA signature (ASN.1 DER) over SHA-384 of the nonce.
  bytes signature = 1;
  // The node's CA identity public key, PKIX/DER encoded.
  bytes identity_pub_der = 2;
  // Reserved for v1.1 TPM EK attestation (not populated in v1.0.0).
  bytes ek_pub = 3;
  bytes ek_cert = 4;
}

// SignSubordinateCSRRequest carries a DER PKCS#10 CSR and the name of the
// certificate profile the signer stamps (which sets CA:TRUE + pathLen).
message SignSubordinateCSRRequest {
  bytes csr_der = 1;
  string profile_name = 2;
}

// SignSubordinateCSRResponse returns the signed child CA certificate and the
// full issuing chain, leaf-first (child, parent, ..., root).
message SignSubordinateCSRResponse {
  repeated bytes chain_der = 1;
  string chain_pem = 2;
}

// IssueLeafRequest carries a DER PKCS#10 CSR and the leaf profile name.
message IssueLeafRequest {
  bytes csr_der = 1;
  string profile_name = 2;
}

message IssueLeafResponse {
  bytes cert_der = 1;
}

message GetSubordinateCSRRequest {}

message GetSubordinateCSRResponse {
  bytes csr_der = 1;
}

// SubmitSubordinateCertificateRequest carries the parent-signed chain,
// leaf-first (this node's cert, parent, ..., root).
message SubmitSubordinateCertificateRequest {
  repeated bytes chain_der = 1;
  string chain_pem = 2;
}

message SubmitSubordinateCertificateResponse {
  Identity identity = 1;
}

// ExportCAKeyRequest carries the operator passphrase the node seals the backup
// under. It travels over the admin mTLS channel; the plaintext CA key does not.
message ExportCAKeyRequest {
  bytes passphrase = 1;
}

// ExportCAKeyResponse returns the encrypted backup envelope (KDF + AEAD over the
// CA key and chain).
message ExportCAKeyResponse {
  bytes envelope = 1;
}

// ImportCAKeyRequest carries an encrypted backup envelope and the passphrase to
// open it, for restoring a CA onto a fresh no-identity node.
message ImportCAKeyRequest {
  bytes envelope = 1;
  bytes passphrase = 2;
}

message ImportCAKeyResponse {
  Identity identity = 1;
}

message BeginKeyRotationRequest {}

// BeginKeyRotationResponse returns the DER CSR for the newly generated key, to
// be ferried to the parent's SignSubordinateCSR.
message BeginKeyRotationResponse {
  bytes csr_der = 1;
}

// CompleteKeyRotationRequest carries the parent-signed chain for the new key,
// leaf-first (this node's new cert, parent, ..., root).
message CompleteKeyRotationRequest {
  repeated bytes chain_der = 1;
  string chain_pem = 2;
}

message CompleteKeyRotationResponse {
  Identity identity = 1;
}

// IssuedCert is one entry in a node's issued-certificate inventory.
message IssuedCert {
  // Hex-encoded certificate serial number (the join key for revocation).
  string serial_hex = 1;
  string subject_dn = 2;
  google.protobuf.Timestamp not_before = 3;
  google.protobuf.Timestamp not_after = 4;
  // Hex-encoded subject key identifier.
  string ski_hex = 5;
  string profile_name = 6;
  google.protobuf.Timestamp issued_at = 7;
}

// Revocation records a revoked certificate.
message Revocation {
  string serial_hex = 1;
  google.protobuf.Timestamp revoked_at = 2;
  // RFC 5280 CRLReason code.
  int32 reason_code = 3;
}

// RevokeCertificateRequest identifies the certificate to revoke by hex serial
// and carries the RFC 5280 reason code.
message RevokeCertificateRequest {
  string serial_hex = 1;
  int32 reason_code = 2;
}

message RevokeCertificateResponse {
  Revocation revocation = 1;
}

message ListIssuedRequest {}

message ListIssuedResponse {
  repeated IssuedCert issued = 1;
}

message ListRevocationsRequest {}

message ListRevocationsResponse {
  repeated Revocation revocations = 1;
}
