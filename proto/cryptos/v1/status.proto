package cryptos.v1;

option go_package = "github.com/CryptOS-PKI/api/go/cryptos/v1;cryptosv1";

// NodeStatus is the response from GetStatus.
message NodeStatus {
  NodeRole role = 1;
  IdentityState identity_state = 2;
  TpmState tpm_state = 3;
  EtcdState etcd_state = 4;
  uint64 boot_count = 5;
  string software_version = 6;
}

// NodeRole is the role this node booted into, from machine config.
enum NodeRole {
  NODE_ROLE_UNSPECIFIED = 0;
  NODE_ROLE_ROOT = 1;
  NODE_ROLE_INTERMEDIATE = 2;
  NODE_ROLE_ISSUING = 3;
}

// IdentityState reflects whether the node has a CA identity yet.
enum IdentityState {
  IDENTITY_STATE_UNSPECIFIED = 0;
  IDENTITY_STATE_NONE = 1;
  IDENTITY_STATE_CEREMONY_IN_PROGRESS = 2;
  IDENTITY_STATE_ESTABLISHED = 3;
}

// TpmState reports TPM availability and capabilities.
enum TpmState {
  TPM_STATE_UNSPECIFIED = 0;
  TPM_STATE_OK = 1;
  TPM_STATE_UNAVAILABLE = 2;
  TPM_STATE_INSUFFICIENT_CAPABILITY = 3;
}

// EtcdState reports the embedded datastore's health.
enum EtcdState {
  ETCD_STATE_UNSPECIFIED = 0;
  ETCD_STATE_OK = 1;
  ETCD_STATE_DEGRADED = 2;
}
